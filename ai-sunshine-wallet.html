<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sunshine Wallet ☀️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
    }
    .dark body { background: linear-gradient(135deg, #1f2937 0%, #111827 100%); }
    
    .sun-glow { animation: sunpulse 4s ease-in-out infinite; }
    @keyframes sunpulse { 0%,100% { filter: drop-shadow(0 0 15px #fbbf24); } 50% { filter: drop-shadow(0 0 35px #f59e0b); } }
    
    .chat-container { scrollbar-width: thin; scrollbar-color: #fbbf24 #f3e8d8; }
    .dark .chat-container { scrollbar-color: #f59e0b #374151; }
    
    .asset-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .asset-card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 20px 25px -5px rgb(251 191 36 / 0.2); }
  </style>
</head>
<body class="min-h-screen text-amber-950 dark:text-amber-100">
  <div class="max-w-6xl mx-auto p-4 md:p-6">
    <!-- 顶部导航 -->
    <nav class="flex justify-between items-center mb-8 bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg rounded-3xl px-6 py-4 shadow">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-gradient-to-br from-orange-400 via-amber-500 to-yellow-400 rounded-2xl flex items-center justify-center text-3xl sun-glow shadow-inner">☀️</div>
        <div>
          <h1 class="text-2xl md:text-3xl font-bold tracking-tight">AI Sunshine Wallet</h1>
          <p class="text-xs md:text-sm text-amber-600 dark:text-amber-400">imToken 十周年 · Token Core 驱动</p>
        </div>
      </div>
      
      <div class="flex items-center gap-3">
        <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-amber-100 dark:hover:bg-gray-800 transition">
          <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
        </button>
        <div class="bg-white dark:bg-gray-800 px-4 py-2 rounded-3xl text-sm font-medium flex items-center gap-2 shadow-inner">
          <i class="fa-solid fa-circle-dot text-green-500 animate-pulse"></i>
          <span id="address" class="font-mono text-xs md:text-sm">0x742d...a3f1</span>
          <button onclick="copyAddress()" class="text-amber-500 hover:text-amber-600"><i class="fa-solid fa-copy"></i></button>
        </div>
        <button onclick="connectWallet()" class="bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-700 hover:to-orange-700 text-white px-5 py-3 rounded-3xl font-medium text-sm transition shadow">
          连接钱包
        </button>
      </div>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <!-- 左侧资产 -->
      <div class="lg:col-span-5 space-y-6">
        <div class="bg-white dark:bg-gray-900 rounded-3xl shadow-xl p-6 md:p-8">
          <div class="flex justify-between">
            <div>
              <p class="text-amber-600 dark:text-amber-400 text-sm">总资产 · 阳光普照</p>
              <p class="text-5xl md:text-6xl font-bold mt-1">$12,458.67</p>
            </div>
            <div class="text-right">
              <div class="inline-flex items-center bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300 text-xs px-4 py-2 rounded-3xl">
                <i class="fa-solid fa-shield-halved mr-2"></i>98% 安全
              </div>
            </div>
          </div>

          <div class="mt-8 space-y-4">
            <div class="asset-card bg-gradient-to-r from-orange-50 to-amber-50 dark:from-gray-800 dark:to-gray-700 p-5 rounded-3xl flex items-center justify-between">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-500 rounded-2xl flex items-center justify-center text-white text-2xl">Ξ</div>
                <div>
                  <p class="font-semibold">Ethereum</p>
                  <p class="text-sm text-gray-500 dark:text-gray-400">0.842 ETH</p>
                </div>
              </div>
              <div class="text-right">
                <p class="font-semibold">$2,847</p>
                <p class="text-xs text-green-500">+2.4%</p>
              </div>
            </div>
            <!-- 更多资产卡片类似，可自行扩展 -->
          </div>
        </div>

        <!-- Staking -->
        <div class="bg-gradient-to-br from-amber-500 to-orange-500 text-white rounded-3xl p-8 text-center shadow-xl">
          <p class="opacity-90 text-sm">Staking 年化收益率</p>
          <p class="text-5xl font-bold my-2">12.8% APY</p>
          <p class="text-sm opacity-90">今日预计收益 <span class="font-semibold">+$8.47</span></p>
        </div>
      </div>

      <!-- AI 聊天区 -->
      <div class="lg:col-span-4 bg-white dark:bg-gray-900 rounded-3xl shadow-xl flex flex-col h-[560px]">
        <div class="p-6 border-b dark:border-gray-700 flex items-center gap-3">
          <i class="fa-solid fa-sparkles text-amber-500"></i>
          <h2 class="font-semibold">AI 阳光助手</h2>
        </div>
        
        <div id="chat" class="flex-1 p-6 overflow-y-auto chat-container space-y-4 text-sm"></div>
        
        <div class="p-4 border-t dark:border-gray-700">
          <div class="flex gap-2">
            <input id="userInput" type="text" 
                   class="flex-1 bg-gray-100 dark:bg-gray-800 rounded-3xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-amber-400 text-sm"
                   placeholder="试试说：转 0.5 ETH 给 Alice" 
                   onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" class="bg-amber-600 hover:bg-amber-700 w-12 h-12 rounded-3xl text-white flex items-center justify-center transition">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- 右侧安全面板 -->
      <div class="lg:col-span-3 space-y-6">
        <div class="bg-white dark:bg-gray-900 rounded-3xl p-6 shadow-xl">
          <h3 class="font-semibold mb-5 flex items-center gap-2">
            <i class="fa-solid fa-shield-halved text-green-500"></i> Security Skill
          </h3>
          <div class="space-y-5 text-sm">
            <div class="flex justify-between"><span>Token Core 私钥</span><span class="text-green-600">✅ 已保护</span></div>
            <div class="flex justify-between"><span>风险扫描</span><span class="text-green-600">✅ 无威胁</span></div>
            <button onclick="optimizeGas()" class="w-full bg-amber-100 dark:bg-amber-900 hover:bg-amber-200 dark:hover:bg-amber-800 py-3 rounded-2xl font-medium">一键 Gas 优化</button>
          </div>
        </div>

        <div onclick="window.open('https://consenlabs-1.wistia.com/medias/hj42m71ozo','_blank')" 
             class="cursor-pointer text-center text-xs text-amber-600 dark:text-amber-400 hover:underline">
          Workshop 素材来源<br>imToken 官方开源
        </div>
      </div>
    </div>
  </div>

  <script>
    let isDark = localStorage.getItem('darkMode') === 'true' || 
                 (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
    
    function toggleDarkMode() {
      isDark = !isDark;
      document.documentElement.classList.toggle('dark', isDark);
      localStorage.setItem('darkMode', isDark);
      document.getElementById('theme-icon').classList.toggle('fa-moon', !isDark);
      document.getElementById('theme-icon').classList.toggle('fa-sun', isDark);
    }

    function copyAddress() {
      navigator.clipboard.writeText("0x742d35Cc6634C0532925a3b844Bc454e4438f44e");
      alert("✅ 地址已复制！");
    }

    function addMessage(text, isUser = false) {
      const chat = document.getElementById('chat');
      const msg = document.createElement('div');
      msg.className = isUser ? 'flex justify-end' : 'flex gap-3';
      msg.innerHTML = isUser ?
        `<div class="max-w-[80%] bg-amber-600 text-white px-5 py-3 rounded-3xl rounded-br-none">${text}</div>` :
        `<div class="w-8 h-8 bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl flex items-center justify-center text-white flex-shrink-0">☀️</div>
         <div class="max-w-[80%] bg-gray-100 dark:bg-gray-800 px-5 py-3 rounded-3xl rounded-bl-none">${text}</div>`;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      
      addMessage(text, true);
      input.value = '';

      setTimeout(() => {
        let reply = '☀️ 已收到！我是你的 AI 阳光助手。';
        if (text.toLowerCase().includes('转') || text.includes('send') || text.includes('transfer')) reply = '✅ 转账指令已解析<br>0.5 ETH → Alice<br>Gas 已优化，是否确认？';
        else if (text.toLowerCase().includes('余额') || text.includes('balance')) reply = '当前总资产 <b>$12,458.67</b><br>ETH 0.842 | BTC 0.031 | TRX 1246';
        else if (text.toLowerCase().includes('安全')) reply = 'Security Skill 扫描完成<br>✅ 无风险 • Token Core 安全等级 98%';
        else if (text.toLowerCase().includes('staking')) reply = 'Staking 收益：<b>12.8% APY</b><br>今日 +$8.47';
        
        addMessage(reply);
      }, 700);
    }

    function connectWallet() { alert('✅ 模拟钱包连接成功！'); }
    function optimizeGas() { alert('🚀 Gas 优化完成！预计节省 18% 手续费'); }

    // 初始化
    window.onload = () => {
      document.documentElement.classList.toggle('dark', isDark);
      document.getElementById('theme-icon').classList.toggle('fa-sun', isDark);
      document.getElementById('theme-icon').classList.toggle('fa-moon', !isDark);
      
      setTimeout(() => {
        addMessage('你好！我是 AI Sunshine 助手 ☀️<br>试试输入自然语言指令吧～');
      }, 500);
    };
  </script>
</body>
</html>
